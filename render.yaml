services:
  - type: web
    name: beadz-api
    runtime: node
    region: singapore
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm run server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false